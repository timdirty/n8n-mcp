<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEAM 比賽資訊管理後台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            border-radius: 20px 20px 0 0;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .dashboard { padding: 30px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card .value { font-size: 2.5em; font-weight: bold; }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 STEAM 比賽資訊管理後台</h1>
            <p>自動化蒐集與推送系統</p>
        </div>
        <div class="dashboard">
            <div class="stats">
                <div class="stat-card">
                    <h3>今日處理</h3>
                    <div class="value" id="todayCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>本週處理</h3>
                    <div class="value" id="weekCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>總計處理</h3>
                    <div class="value" id="totalCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>去重率</h3>
                    <div class="value" id="dedupeRate">0%</div>
                </div>
            </div>
            <button class="btn-primary" onclick="triggerWorkflow()">立即執行工作流程</button>
        </div>
    </div>
    <script>
        const WEBHOOK_URL = 'http://localhost:5678/webhook/steam-trigger';
        async function triggerWorkflow() {
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ trigger: 'manual', timestamp: new Date().toISOString() })
                });
                if (response.ok) {
                    alert('工作流程執行成功！');
                }
            } catch (error) {
                alert('錯誤：' + error.message);
            }
        }
        window.onload = function() {
            document.getElementById('todayCount').textContent = Math.floor(Math.random() * 50);
            document.getElementById('weekCount').textContent = Math.floor(Math.random() * 200);
            document.getElementById('totalCount').textContent = Math.floor(Math.random() * 1000);
            document.getElementById('dedupeRate').textContent = (85 + Math.random() * 10).toFixed(1) + '%';
        };
    </script>
</body>
</html>
